<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localka-Box Loading Screen</title>
    <!-- Добавили ?v=2 для принудительного сброса кэша -->
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <!-- Фоновая музыка -->
    <audio id="loading-music" src="scp.mp3" autoplay loop></audio>

    <!-- Современная интерактивная кнопка звука -->
    <button id="mute-btn" onclick="toggleMusic()" title="Включить/Выключить звук">
        <svg id="sound-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <path class="sound-wave wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path class="sound-wave wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
    </button>

    <!-- Главный блок строго по центру экрана -->
    <div class="main-center-block">
        <h1 class="server-title">Localka-Box</h1>
        <img class="server-logo" src="lcb.png" alt="Logo">
    </div>

    <!-- Тексты загрузки от Garry's Mod внизу экрана -->
    <div class="gmod-status">
        <!-- Контейнер для статуса с поддержкой точек -->
        <div id="status-box" class="dots-disabled"><span id="status"></span></div>
        <!-- Карта и аддоны -->
        <div id="map"></div>
    </div>

    <script>
        var audio = document.getElementById('loading-music');
        var btn = document.getElementById('mute-btn');

        // Обход блокировки автоплея в Chromium: музыка включится при первом движении мыши в GMod
        function initAudioAutoplay() {
            if (audio) {
                audio.play().then(function() {
                    window.removeEventListener('mousemove', initAudioAutoplay);
                }).catch(function(e) {
                    console.log("Автоплей заблокирован, ждем движения мыши...");
                });
            }
        }
        window.addEventListener('mousemove', initAudioAutoplay);

        function toggleMusic() {
            if (!audio) return;
            if (audio.muted) {
                audio.muted = false;
                audio.play();
                btn.classList.remove('muted');
            } else {
                audio.muted = true;
                btn.classList.add('muted');
            }
        }

        var mapTimer = null;

        // Эффект печати (оставлен ТОЛЬКО для плавного появления названия карты при старте)
        function typeWriterEffect(element, text, speed) {
            if (element.getAttribute('data-current-text') === text) return;
            element.setAttribute('data-current-text', text);
            
            clearInterval(mapTimer);
            element.innerHTML = ""; 
            
            var i = 0;
            mapTimer = setInterval(function() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(mapTimer);
                }
            }, speed);
        }

        // Стартовое состояние при заходе
        window.onload = function() {
            document.getElementById('status').innerHTML = "Подключение к серверу";
            document.getElementById('status-box').className = "dots-enabled";
            typeWriterEffect(document.getElementById('map'), "Загрузка карты", 25);
        };

        // Автоматически вызывается Garry's Mod при старте
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume) {
            typeWriterEffect(document.getElementById('map'), "Карта: " + mapname, 15);
            if (audio && volume !== undefined) {
                audio.volume = volume; 
            }
        }
        
        // Быстрое обновление статуса (без ломающих анимаций)
        function SetStatusChanged(status) {
            var statusElem = document.getElementById('status');
            if (statusElem.innerHTML !== status) {
                document.getElementById('status-box').className = "dots-enabled";
                statusElem.innerHTML = status;
            }
        }
        
        // Отображение файлов теперь мгновенное, без ломающегося эффекта печати
        function DownloadingFile(filename) {
            document.getElementById('status-box').className = "dots-enabled";
            document.getElementById('status').innerHTML = "Загрузка контента";
            
            var cleanName = filename.replace(/^downloads\//, "").replace(/"/g, "");
            var mapElem = document.getElementById('map');
            
            mapElem.setAttribute('data-current-text', "Скачивание: " + cleanName);
            clearInterval(mapTimer); 
            mapElem.innerHTML = "Скачивание: " + cleanName;
        }
    </script>
</body>
</html>
