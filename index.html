<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCB City Loading Screen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0d0e12; 
            color: #ffffff;
            font-family: 'Bahnschrift', 'DIN Pro', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.07) 0%, rgba(13, 14, 18, 0.2) 65%, rgba(13, 14, 18, 0.95) 100%);
        }

        .main-panel {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 560px; 
        }

        .brand-holder {
            display: flex;
            align-items: center;
            margin-bottom: 30px; 
        }

        .logo-box img {
            height: 130px; 
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 5px 14px rgba(0, 0, 0, 0.6));
        }

        .brand-dash {
            font-size: 78px; 
            font-weight: 600;
            line-height: 1;
            margin-left: 16px;  
            margin-right: 13px; 
            text-shadow: 0px 5px 14px rgba(0, 0, 0, 0.6);
            opacity: 0.9;
            transform: translateY(-5px); 
        }

        .text-city {
            font-size: 78px; 
            font-weight: 600; 
            letter-spacing: -1.5px;
            line-height: 1;
            text-shadow: 0px 5px 14px rgba(0, 0, 0, 0.75), 0px 0px 22px rgba(255, 255, 255, 0.05);
        }

        .loading-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-line-bg {
            width: 100%;
            height: 2px; 
            background-color: rgba(255, 255, 255, 0.1); 
            overflow: hidden;
            position: relative;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.5);
        }

        .progress-line-fill {
            height: 100%;
            width: 0%; 
            background-color: #ffffff; 
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6); 
            transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1); 
        }

        .status-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px; 
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        #status-msg {
            max-width: 80%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* НАДПИСЬ В УГЛУ СТАЛА ЧУТЬ БОЛЬШЕ И ЗАМЕТНЕЕ */
        .footer-navigation {
            position: absolute;
            bottom: 40px;
            right: 50px;
            z-index: 10;
            font-size: 15px; /* Увеличено с 12px */
            font-weight: 500; /* Сделано чуть плотнее */
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.45);
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- Скрытый аудиоплеер для фоновой музыки -->
    <audio id="bg-audio" src="bg-music.mp3" loop></audio>

    <canvas id="bg-particles"></canvas>
    <div class="vignette"></div>

    <div class="main-panel">
        <div class="brand-holder">
            <div class="logo-box">
                <img src="lcb.png" alt="" onerror="this.style.display='none'; document.getElementById('text-fallback').style.display='inline-block';">
                <span id="text-fallback" style="display:none; font-size:54px; font-weight:700; margin-right:12px;">LCB</span>
            </div>
            
            <div class="brand-dash">-</div>
            <div class="text-city">City</div>
        </div>

        <div class="loading-wrapper">
            <div class="progress-line-bg">
                <div class="progress-line-fill" id="gmod-bar"></div>
            </div>
            <div class="status-info">
                <div id="status-msg">Запуск интерфейса...</div>
                <div id="status-pct">0%</div>
            </div>
        </div>
    </div>

    <!-- Обновленная ссылка в углу -->
    <div class="footer-navigation">
        Localka-Box Discord: discord.gg/Pukt9syQXW
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-audio');
            audio.volume = 0.3; 
            audio.play().catch(error => {
                console.log("Автовоспроизведение заблокировано.");
            });
        });

        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particleCount = 80; 
        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                length: Math.random() * 8 + 6,  
                speed: Math.random() * 0.7 + 0.4 
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; 
            ctx.lineWidth = 1;

            for (let i = 0; i < particleCount; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.length); 
                ctx.stroke();

                p.y += p.speed;

                if (p.y > height) {
                    p.y = -15;
                    p.x = Math.random() * width;
                }
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        function SetFilesNeeded(needed) {
            window.totalFiles = needed;
            window.filesLeft = needed;
        }

        function DownloadingFile(fileName) {
            const audio = document.getElementById('bg-audio');
            if (audio && audio.paused) { audio.play(); }

            let cleanName = fileName.replace(/^.+\//, '');
            document.getElementById('status-msg').innerText = `Загрузка: ${cleanName}`;
            
            if(window.filesLeft && window.filesLeft > 0) {
                window.filesLeft--;
                let percent = Math.floor(((window.totalFiles - window.filesLeft) / window.totalFiles) * 100);
                if (percent > 100) percent = 100;
                
                document.getElementById('gmod-bar').style.width = percent + '%';
                document.getElementById('status-pct').innerText = percent + '%';
            }
        }

        function SetStatusChanged(status) {
            document.getElementById('status-msg').innerText = status;
            const audio = document.getElementById('bg-audio');
            if (audio && audio.paused) { audio.play(); }
        }
    </script>
</body>
</html>
