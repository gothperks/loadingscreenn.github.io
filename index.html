<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localka-Box Loading Screen</title>
    <!-- Версия v=6 для сброса кэша игры -->
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

    <!-- Фоновая музыка -->
    <audio id="loading-music" src="scp.mp3" autoplay loop></audio>

    <!-- Главный блок строго по центру экрана -->
    <div class="main-center-block">
        <h1 class="server-title">Localka-Box</h1>
        <img class="server-logo" src="lcb.png" alt="Logo">
    </div>

    <!-- Тексты загрузки от Garry's Mod внизу экрана -->
    <div class="gmod-status">
        <div id="status"></div>
        <div id="map"></div>
    </div>

    <script>
        var audio = document.getElementById('loading-music');
        var btn = document.getElementById('mute-btn'); // Эта кнопка не существует в HTML, но переменная объявлена

        function initAudioAutoplay() {
            if (audio) {
                audio.play().then(function() {
                    window.removeEventListener('mousemove', initAudioAutoplay);
                }).catch(function(e) {
                    console.log("Автоплей заблокирован, ждем движения мыши...");
                });
            }
        }
        window.addEventListener('mousemove', initAudioAutoplay);

        function toggleMusic() {
            if (!audio) return;
            if (audio.muted) {
                audio.muted = false;
                audio.play();
                btn.classList.remove('muted');
            } else {
                audio.muted = true;
                btn.classList.add('muted');
            }
        }

        var mapTimer = null; // Таймер для typewriter эффекта на 'map' элементе

        function typeWriterEffect(element, text, speed) {
            // Если это не 'map' элемент, просто устанавливаем текст без эффекта печатной машинки
            if (element.id !== 'map') {
                element.innerHTML = text;
                return;
            }

            // Проверяем, не является ли новый текст тем же, что уже печатается или установлен
            if (element.getAttribute('data-current-text') === text) {
                return; // Не перезапускаем эффект, если текст тот же
            }
            element.setAttribute('data-current-text', text); // Сохраняем текст, который должен быть установлен
            
            clearInterval(mapTimer); // Очищаем любой предыдущий typewriter эффект на 'map' элементе
            element.innerHTML = ""; // Очищаем текущее содержимое
            
            var i = 0;
            mapTimer = setInterval(function() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(mapTimer);
                    mapTimer = null; // Обнуляем таймер после завершения
                }
            }, speed);
        }

        window.onload = function() {
            // Изначально верхняя строка показывает подключение
            document.getElementById('status').innerHTML = "Подключение к серверу";
            // Изначально нижняя строка показывает "Загрузка карты" с эффектом
            typeWriterEffect(document.getElementById('map'), "Загрузка карты", 25);
        };

        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume) {
            // ОБНОВЛЕНО: Этот блок всегда устанавливает название карты в элемент 'map'
            typeWriterEffect(document.getElementById('map'), "Карта: " + mapname, 15);
            
            if (audio && volume !== undefined) {
                audio.volume = volume; 
            }
        }
        
        function SetStatusChanged(status) {
            var statusElem = document.getElementById('status');
            var cleanStatus = status.replace(/\.+$/, ""); // Удаляем завершающие точки

            // Обновляем статус только если он изменился, без typewriter эффекта
            if (statusElem.innerHTML !== cleanStatus) {
                statusElem.innerHTML = cleanStatus;
            }
        }
        
        function DownloadingFile(filename) {
            var cleanName = filename.replace(/^downloads\//, "").replace(/"/g, "");
            
            // ИСПРАВЛЕНО: Теперь 'status' показывает, что именно скачивается.
            // Элемент 'map' (с названием карты) остается нетронутым.
            document.getElementById('status').innerHTML = "Скачивание: " + cleanName;
        }
    </script>
</body>
</html>
